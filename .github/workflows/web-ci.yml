name: Web CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  client-ci:
    name: Client CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-fyp-main/client
    env:
      CI: true
      VITE_API_BASE_URL: http://localhost:8081
      VITE_AI_SERVICE_URL: http://localhost:5001
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-fyp-main/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  server-ci:
    name: Server CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-fyp-main/server
    env:
      NODE_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-fyp-main/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
